name: Scheduled Security Audit

on:
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      audit_type:
        description: 'Type of audit to run'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - api
          - frontend
          - infrastructure
          - data-privacy

permissions: {}

jobs:
  security-audit:
    if: false # Disabled — enable when ready to use
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine audit type
        id: audit-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.audit_type }}" >> "$GITHUB_OUTPUT"
          else
            echo "type=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Set date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create docs directory
        run: mkdir -p docs/security

      - name: Run security audit
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run the ${{ steps.audit-type.outputs.type }} security audit on this repository.

            Use the appropriate audit command based on the type:
            - full: Run /project:security-full-audit
            - api: Run /project:security-api-audit
            - frontend: Run /project:security-frontend-audit
            - infrastructure: Run /project:security-infrastructure-audit
            - data-privacy: Run /project:security-data-privacy-audit

            The audit type is: ${{ steps.audit-type.outputs.type }}

            Generate all reports in docs/security/ with today's date (${{ steps.date.outputs.date }}).
            Be thorough and follow the complete audit methodology.
          timeout_minutes: 55

      - name: Check for report files
        id: check-reports
        run: |
          if ls docs/security/*-${{ steps.date.outputs.date }}.md 1>/dev/null 2>&1; then
            echo "reports_exist=true" >> "$GITHUB_OUTPUT"
            echo "Found security audit reports:"
            ls -la docs/security/*-${{ steps.date.outputs.date }}.md
          else
            echo "reports_exist=false" >> "$GITHUB_OUTPUT"
            echo "No reports generated"
          fi

      - name: Create branch and PR with audit results
        if: steps.check-reports.outputs.reports_exist == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="security-audit/${{ steps.date.outputs.date }}-${{ steps.audit-type.outputs.type }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/security/
          git commit -m "Security audit report (${{ steps.audit-type.outputs.type }}) - ${{ steps.date.outputs.date }}"
          git push -u origin "$BRANCH"

          BODY=$(cat <<'EOF'
          ## Security Audit Report

          **Type**: ${{ steps.audit-type.outputs.type }}
          **Date**: ${{ steps.date.outputs.date }}
          **Trigger**: ${{ github.event_name }}

          ### Reports Generated
          $(ls docs/security/*-${{ steps.date.outputs.date }}.md | sed 's|^|- |')

          ### Next Steps
          1. Review the findings in the report files
          2. Prioritize critical and high severity findings
          3. Create issues for remediation items
          4. Merge this PR to archive the audit report

          ---
          *Generated by the scheduled security audit workflow using Claude Code*
          EOF
          )

          gh pr create \
            --title "Security Audit (${{ steps.audit-type.outputs.type }}): ${{ steps.date.outputs.date }}" \
            --body "$BODY" \
            --label "security,audit"

      - name: Upload reports as artifacts
        if: steps.check-reports.outputs.reports_exist == 'true'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: security-audit-${{ steps.audit-type.outputs.type }}-${{ steps.date.outputs.date }}
          path: docs/security/*-${{ steps.date.outputs.date }}.md
          retention-days: 90
